<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Formas - Addison</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contenedor-formas {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .caja-figura {
            background-color: white;
            border: 8px solid #9C27B0;
            border-radius: 30px;
            width: 100%;
            padding: 35px 10px;
            margin-bottom: 25px;
            box-shadow: 0 10px 0 #7B1FA2;
        }

        .figura-gigante {
            font-size: 110px;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.1));
            transition: transform 0.2s;
        }

        .forma-info {
            font-size: 28px;
            color: #333;
            font-weight: bold;
        }

        .grid-formas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 30px;
        }

        .btn-forma {
            background-color: #FFF;
            border: 4px solid #9C27B0;
            border-radius: 20px;
            padding: 12px 0;
            font-size: 45px; /* Emojis gigantes de figuras */
            cursor: pointer;
            box-shadow: 0 6px 0 #7B1FA2;
            transition: all 0.1s ease;
        }

        .btn-forma:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7B1FA2;
        }

        .btn-volver {
            background-color: #607D8B;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #455A64;
        }

        .btn-volver:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #455A64;
        }
    </style>
</head>
<body>

    <div class="contenedor-formas">
        <h1>📐 Las Formas 🔴</h1>
        <p class="sub">¡Toca una forma para ver su nombre!</p>

        <!-- Pizarra interactiva -->
        <div class="caja-figura" id="pizarra">
            <span id="pantalla-figura" class="figura-gigante">🔴</span>
            <p id="pantalla-nombre" class="forma-info">¡El Círculo!</p>
        </div>

        <!-- Botones de selección -->
        <div class="grid-formas">
            <button class="btn-forma" onclick="cambiarForma('🔴', '¡El Círculo!', '#E53935')">🔴</button>
            <button class="btn-forma" onclick="cambiarForma('🟦', '¡El Cuadrado!', '#1E88E5')">🟦</button>
            <button class="btn-forma" onclick="cambiarForma('🔺', '¡El Triángulo!', '#43A047')">🔺</button>
            <button class="btn-forma" onclick="cambiarForma('🔸', '¡El Rombo!', '#FB8C00')">🔸</button>
            <button class="btn-forma" onclick="cambiarForma('⭐', '¡La Estrella!', '#FDD835')">⭐</button>
            <button class="btn-forma" onclick="cambiarForma('🛑', '¡El Hexágono!', '#8E24AA')">🛑</button>
        </div>

        <!-- Volver con el truco anti-carga -->
        <button class="btn-volver" onclick="irAlMenu()">← Volver al Menú</button>
    </div>

    <script>
        function cambiarForma(emoji, nombre, colorBorde) {
            const pantallaFigura = document.getElementById('pantalla-figura');
            const pantallaNombre = document.getElementById('pantalla-nombre');
            const pizarra = document.getElementById('pizarra');

            pantallaFigura.innerText = emoji;
            pantallaNombre.innerText = nombre;
            
            // Cambia el color del borde dinámicamente según la figura
            pizarra.style.borderColor = colorBorde;
            pizarra.style.boxShadow = `0 10px 0 ${colorBorde}`;
            pantallaNombre.style.color = colorBorde;

            // Animación brinco divertido
            pantallaFigura.style.transform = 'scale(1.25)';
            setTimeout(() => { pantallaFigura.style.transform = 'scale(1)'; }, 150);

            // Aviso a App Inventor por si pones audio nativo
            if (window.AppInventor) {
                window.AppInventor.setWebViewString("forma_" + nombre.toLowerCase().replace('¡el ', '').replace('¡la ', '').replace('!', ''));
            }
        }

        function irAlMenu() {
            window.location.href = "index.html?menu=true";
        }
    </script>

</body>
</html>
