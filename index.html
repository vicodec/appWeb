<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colegio Divertido 🎒</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Rounded MT Bold', sans-serif; /* Letra amigable para niños */
        }

        body {
            background-color: #FFFDE7; /* Amarillo pastel muy suave */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            min-height: 100vh;
        }

        h1 {
            color: #FF5722; /* Naranja llamativo */
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 2px 2px #FFE0B2;
            text-align: center;
        }

        .sub {
            color: #4CAF50;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Contenedor en cuadrícula (Grid) para los botones de juego */
        .grid-juegos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 360px;
        }

        /* Estilo de los botones (Grandes y coloridos) */
        .card-juego {
            border: none;
            border-radius: 20px;
            padding: 25px 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px #ccc;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Efecto de hundido al presionar (como un juguete real) */
        .card-juego:active {
            box-shadow: 0 2px #666;
            transform: translateY(4px);
        }

        /* Colores vivos para cada categoría */
        .btn-letras { background-color: #E91E63; box-shadow: 0 6px #C2185B; } /* Rosado */
        .btn-numeros { background-color: #2196F3; box-shadow: 0 6px #1976D2; } /* Azul */
        .btn-colores { background-color: #FFEB3B; color: #333; box-shadow: 0 6px #FBC02D; } /* Amarillo */
        .btn-formas { background-color: #9C27B0; box-shadow: 0 6px #7B1FA2; } /* Morado */

        .emoji {
            font-size: 40px;
        }
    </style>
</head>
<body>

    <h1>🏫 Mi Cole Virtual 🎒</h1>
    <p class="sub">¡Toca un botón para aprender jugando!</p>

    <div class="grid-juegos">
        
        <button class="card-juego btn-letras" onclick="jugar('letras')">
            <span class="emoji">🅰️</span>
            <span>Las Vocales</span>
        </button>

        <button class="card-juego btn-numeros" onclick="jugar('numeros')">
            <span class="emoji">🔢</span>
            <span>Los Números</span>
        </button>

        <button class="card-juego btn-colores" onclick="jugar('colores')">
            <span class="emoji">🎨</span>
            <span>Los Colores</span>
        </button>

        <button class="card-juego btn-formas" onclick="jugar('formas')">
            <span class="emoji">📐</span>
            <span>Las Formas</span>
        </button>

    </div>

    <script>
        function jugar(tipoJuego) {
            // Le avisamos a App Inventor qué botón tocó el niño
            if (window.AppInventor) {
                window.AppInventor.setWebViewString(tipoJuego);
            } else {
                alert("Vas a jugar a: " + tipoJuego);
            }
        }
    </script>

</body>
</html>
