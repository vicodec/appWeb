<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colegio Addison 🏫</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. PANTALLA DE CARGA (CON PORCENTAJE) -->
    <div id="pantalla-carga">
        <div class="logo-addison">🎒</div>
        <div class="titulo-colegio">Addison</div>
        <div class="subtitulo-carga">¡Cargando la aventura! ✨</div>
        <div class="contenedor-barra">
            <div id="mi-barra" class="barra-progreso"></div>
        </div>
        <div id="porcentaje" class="texto-porcentaje">0%</div>
    </div>

    <!-- 2. SECCIÓN TIPO ÍNDICE (TEMAS) -->
    <div id="contenido-principal">
        <h1>🏫 Colegio Addison 🎒</h1>
        <p class="sub">¡Toca lo que quieras aprender hoy!</p>

        <div class="grid-juegos">
            
            <button class="card-juego btn-vocales" onclick="seleccionarTema('vocales')">
                <span class="emoji">🅰️</span>
                <span>Las Vocales</span>
            </button>

            <button class="card-juego btn-colores" onclick="seleccionarTema('colores')">
                <span class="emoji">🎨</span>
                <span>Los Colores</span>
            </button>

            <button class="card-juego btn-animales" onclick="seleccionarTema('animales')">
                <span class="emoji">🦁</span>
                <span>Animales</span>
            </button>

            <button class="card-juego btn-numeros" onclick="seleccionarTema('numeros')">
                <span class="emoji">🔢</span>
                <span>Números</span>
            </button>

            <button class="card-juego btn-abecedario" onclick="seleccionarTema('abecedario')">
                <span class="emoji">🔤</span>
                <span>Abecedario</span>
            </button>

            <button class="card-juego btn-formas" onclick="seleccionarTema('formas')">
                <span class="emoji">📐</span>
                <span>Las Formas</span>
            </button>

            <button class="card-juego btn-mas" style="grid-column: span 2;" onclick="seleccionarTema('sorpresa')">
                <span class="emoji">🎁</span>
                <span>¡Juego Sorpresa!</span>
            </button>

        </div>
    </div>

    <script>
        // Animación del porcentaje de carga
        let progreso = 0;
        const barra = document.getElementById('mi-barra');
        const textoPorcentaje = document.getElementById('porcentaje');
        const pantallaCarga = document.getElementById('pantalla-carga');
        const contenidoPrincipal = document.getElementById('contenido-principal');

        const intervalo = setInterval(() => {
            progreso += 1;
            barra.style.width = progreso + '%';
            textoPorcentaje.innerText = progreso + '%';

            if (progreso >= 100) {
                clearInterval(intervalo);
                
                // Le avisa a App Inventor que la carga terminó por si quieres lanzar un sonido inicial
                if (window.AppInventor) {
                    window.AppInventor.setWebViewString("inicio_listo");
                }

                // Desvanecer pantalla de carga
                pantallaCarga.style.opacity = '0';
                setTimeout(() => {
                    pantallaCarga.style.display = 'none';
                    contenidoPrincipal.style.display = 'block';
                }, 500);
            }
        }, 40); // Tarda unos 4 segundos en cargar completo

        // Función que envía el tema seleccionado a los bloques de App Inventor
              // Función que envía el tema seleccionado a los bloques de App Inventor o redirige en la Web
        function seleccionarTema(tema) {
            if (tema === 'vocales') {
                window.location.href = "vocales.html";
            } else if (tema === 'colores') {
                window.location.href = "colores.html";
            } else if (tema === 'animales') {
                window.location.href = "animales.html";
            } else {
                if (window.AppInventor) {
                    window.AppInventor.setWebViewString(tema);
                } else {
                    alert("Has seleccionado el tema: " + tema);
                }
            }
        }
    </script>

</body>
</html>
    </script>

</body>
</html>
