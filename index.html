<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colegio Addison 🏫</title>
    <!-- Esta línea conecta el HTML con tu nuevo archivo CSS ordenado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. PANTALLA DE CARGA -->
    <div id="pantalla-carga">
        <div class="logo-addison">🏫</div>
        <div class="titulo-colegio">Addison</div>
        <div class="subtitulo-carga">Preparando la diversión...</div>
        <div class="contenedor-barra">
            <div id="mi-barra" class="barra-progreso"></div>
        </div>
        <div id="porcentaje" class="texto-porcentaje">0%</div>
    </div>

    <!-- 2. CONTENIDO PRINCIPAL -->
    <div id="contenido-principal">
        <h1>Colegio Addison 🏫</h1>
        <p class="sub">¡Toca y aprende jugando!</p>

        <div class="grid-juegos">
            <button class="card-juego btn-letras" onclick="jugar('letras')">
                <span class="emoji">🅰️</span>
                <span>Vocales</span>
            </button>
            <button class="card-juego btn-numeros" onclick="jugar('numeros')">
                <span class="emoji">🔢</span>
                <span>Números</span>
            </button>
            <button class="card-juego btn-colores" onclick="jugar('colores')">
                <span class="emoji">🎨</span>
                <span>Colores</span>
            </button>
            <button class="card-juego btn-formas" onclick="jugar('formas')">
                <span class="emoji">📐</span>
                <span>Formas</span>
            </button>
        </div>
    </div>

    <script>
        let progreso = 0;
        const barra = document.getElementById('mi-barra');
        const textoPorcentaje = document.getElementById('porcentaje');
        const pantallaCarga = document.getElementById('pantalla-carga');
        const contenidoPrincipal = document.getElementById('contenido-principal');

        const intervalo = setInterval(() => {
            progreso += 1;
            barra.style.width = progreso + '%';
            textoPorcentaje.innerText = progreso + '%';

            if (progreso >= 100) {
                clearInterval(intervalo);
                
                if (window.AppInventor) {
                    window.AppInventor.setWebViewString("cargo_completo");
                }

                pantallaCarga.style.opacity = '0';
                setTimeout(() => {
                    pantallaCarga.style.display = 'none';
                    contenidoPrincipal.style.display = 'block';
                }, 500);
            }
        }, 35);

        function jugar(tipoJuego) {
            if (window.AppInventor) {
                window.AppInventor.setWebViewString(tipoJuego);
            } else {
                alert("Abriendo juego: " + tipoJuego);
            }
        }
    </script>

</body>
</html>
